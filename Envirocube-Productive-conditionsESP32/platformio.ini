[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps = bodmer/TFT_eSPI @ ^2.5.43
monitor_speed = 115200

; --- STOP THE BOOT LOOP ---
board_build.flash_mode = qio     ; Change dio to qio for S3 modules
board_build.f_flash = 80000000L
board_upload.flash_size = 4MB

build_flags =
  -D USER_SETUP_LOADED=1
  -D ST7789_DRIVER=1
  -D TFT_WIDTH=135
  -D TFT_HEIGHT=240
  -D TFT_SPI_MODE=1          ; FORCES SPI COMMUNICATION
  -D TFT_MOSI=35
  -D TFT_SCLK=36
  -D TFT_CS=4
  -D TFT_DC=3
  -D TFT_RST=5
  -D TFT_BL=45